<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>NutriBase Demo Control Panel</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: #14171c;
    color: #e6e8eb;
  }
  header {
    padding: 14px 24px;
    background: #1b1f27;
    border-bottom: 1px solid #2a2f3a;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 16px; margin: 0 0 4px; font-weight: 600; }

  #base-url-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  #base-url-bar input {
    background: #0f1218; border: 1px solid #3c4560; color: #e6e8eb;
    border-radius: 6px; padding: 6px 10px; font-size: 12px; width: 300px;
    max-width: 45vw; font-family: inherit;
  }
  #base-url-status { font-size: 11px; color: #8b92a3; }
  #base-url-status.err { color: #ff9a9a; }

  #teleprompter {
    background: #0f2a4a;
    border-bottom: 2px solid #2f6fbf;
    padding: 18px 24px;
    font-size: 20px;
    line-height: 1.5;
    font-style: italic;
    color: #d6e6ff;
    display: none;
  }
  #teleprompter.show { display: block; }
  #teleprompter .label {
    font-style: normal; font-size: 11px; letter-spacing: .08em; text-transform: uppercase;
    color: #7fb0ee; margin-bottom: 6px; font-weight: 700;
  }

  main { padding: 16px 24px 60px; max-width: 920px; margin: 0 auto; }

  .instance-block {
    border: 1px solid #2a2f3a; border-radius: 12px; margin-bottom: 22px; overflow: hidden;
  }
  .instance-header {
    background: #1b1f27; padding: 12px 16px; display: flex; align-items: center;
    justify-content: space-between; gap: 12px; flex-wrap: wrap;
  }
  .instance-header .name { font-size: 15px; font-weight: 700; text-transform: capitalize; }
  .instance-header .url { font-size: 11px; color: #8b92a3; margin-left: 8px; }
  .instance-actions { display: flex; gap: 8px; align-items: center; }
  .pill-btn {
    background: #2b3346; color: #dfe4f5; border: 1px solid #3c4560;
    border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 12px;
  }
  .pill-btn:hover { background: #333d54; }
  .pill-btn.pause-on { background: #4a3320; border-color: #7a5626; color: #ffcf8a; }
  .pill-btn.continue { background: #16321f; border-color: #2c5a3a; color: #7fd99a; font-weight: 600; }
  .pill-btn.continue:hover { background: #1c3f27; }
  .pill-btn.danger { background: #3a2126; border-color: #5a2a2f; color: #ff8a8a; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
  .dot.off { background: #555; }
  .dot.on { background: #3ecf6a; }
  .waiting { padding: 0 16px 12px; font-size: 12px; color: #ffcf8a; }
  .waiting strong { color: #ffe0ad; }

  .segment-label {
    padding: 10px 16px 4px; font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; color: #6c7486; font-weight: 700;
  }
  .card {
    background: #171b22; border-top: 1px solid #2a2f3a;
    padding: 12px 16px; transition: background .15s;
  }
  .card.running { background: #17233a; }
  .card.ok { background: #142318; }
  .card.err { background: #2a1616; }
  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .title { font-size: 14px; font-weight: 600; }
  .run-btn {
    background: #2b3346; color: #dfe4f5; border: 1px solid #3c4560;
    border-radius: 6px; padding: 7px 16px; cursor: pointer; font-size: 13px;
    white-space: nowrap;
  }
  .run-btn:hover { background: #333d54; }
  .run-btn:active { transform: translateY(1px); }
  .requires { font-size: 12px; color: #8b92a3; margin-top: 6px; }
  .result { font-size: 12px; margin-top: 8px; padding: 6px 10px; border-radius: 6px; }
  .result.ok { background: #16261c; color: #7fd99a; }
  .result.err { background: #2a1616; color: #ff9a9a; }
</style>
</head>
<body>
<header>
  <h1>NutriBase Demo Control Panel</h1>
  <div id="base-url-bar">
    <input id="base-url-input" type="text" placeholder="http://localhost:3000" />
    <button class="pill-btn" data-action="set-base-url">Set</button>
    <button class="pill-btn" data-action="quick-local">Local</button>
    <span id="base-url-status"></span>
  </div>
</header>
<div id="teleprompter">
  <div class="label">Say</div>
  <div id="teleprompter-text"></div>
</div>
<main id="app"></main>
<script src="app.js"></script>
</body>
</html>
